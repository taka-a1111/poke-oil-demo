<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{overflow-x:hidden;}
  body{min-height:100vh;
    background:
      radial-gradient(55% 42% at 12% 7%, #8fd0e6 0%, rgba(143,208,230,0) 55%),
      radial-gradient(78% 60% at 90% 60%, #ef7168 0%, rgba(239,113,104,0) 62%),
      radial-gradient(48% 30% at 52% 100%, #efe7cf 0%, rgba(239,231,207,0) 60%),
      linear-gradient(150deg,#7cc3dc 0%, #a7b3c8 40%, #e07d76 74%, #f0a48f 100%);
    background-attachment:fixed;}
  body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
    background-image:url('img/grain.png');background-size:200px;background-repeat:repeat;
    mix-blend-mode:soft-light;opacity:.7;}
  .sp{position:relative;z-index:1;max-width:400px;margin:0 auto;background:#fff;
    box-shadow:0 0 60px rgba(0,0,0,.12);}
  .sp img{display:block;width:100%;height:auto;}
  #product{position:absolute;top:14.7677%;left:0;width:1px;height:1px;}
  .hit{position:absolute;display:block;z-index:5;
    /* background:rgba(255,0,0,.35); */ }

  /* ===== PC-only hero side header (shown on wide screens) ===== */
  .pc-header{display:none;}
  @media (min-width:1040px){
    .pc-header{display:block;position:absolute;top:0;left:0;width:100%;height:700px;z-index:1;pointer-events:none;
      font-family:'Hiragino Sans','Noto Sans JP',sans-serif;}
    .pc-header .side{position:absolute;top:0;height:700px;display:flex;align-items:center;justify-content:center;}
    .pc-header .left{left:0;width:calc((100% - 400px)/2);}
    .pc-header .right{right:0;width:calc((100% - 400px)/2);}
    .pc-header .wordmark{width:238px;height:auto;display:block;}
    .pc-header .cards{display:flex;gap:25px;align-items:flex-start;pointer-events:auto;}
    .pc-card{display:flex;flex-direction:column;align-items:center;gap:13px;width:150px;}
    .pc-card .bwrap{height:150px;display:flex;align-items:flex-end;justify-content:center;}
    .pc-card .bwrap img{height:150px;width:auto;display:block;}
    .pc-card .nm{font-family:'Montserrat',sans-serif;font-weight:600;font-size:17px;color:#fff;letter-spacing:.85px;line-height:1.5;}
    .pc-card .pill{position:relative;width:150px;height:17px;display:flex;align-items:center;justify-content:center;}
    .pc-card .pill i{position:absolute;inset:0;opacity:.85;}
    .pc-card.sarari .pill i{background:#b2e4f3;} .pc-card.torori .pill i{background:#ffccc7;}
    .pc-card .pill span{position:relative;font-weight:400;font-size:10px;color:#363636;letter-spacing:1px;}
    .pc-card .price{font-family:'Montserrat',sans-serif;font-weight:600;color:#fff;letter-spacing:.75px;line-height:1.5;}
    .pc-card .price .y{font-size:11px;} .pc-card .price .n{font-size:15px;}
    .pc-card .price .t{font-family:'Hiragino Sans','Noto Sans JP';font-weight:400;font-size:10px;letter-spacing:1px;}
    .pc-card .buy{width:150px;height:35px;border-radius:50px;display:flex;align-items:center;justify-content:center;gap:10px;
      color:#fff;font-weight:600;font-size:12px;text-decoration:none;box-shadow:0 4px 22px rgba(239,228,209,.6);}
    .pc-card.sarari .buy{background:linear-gradient(75.6deg,#00ace7 7.8%,#04a696 100%);}
    .pc-card.torori .buy{background:linear-gradient(76.3deg,#ff507c 1.2%,#ff6e6c 100%);}
    .pc-card .buy img{width:11px;height:11px;}
  }

</style>
