  /* ===== 背景（Figma実アセット：Rectangle 45=ヒーロー / Rectangle 46=以降リピート） ===== */
  .bg{position:absolute;inset:0;overflow:hidden;z-index:0;pointer-events:none;}
  .bg .b{position:absolute;left:0;right:0;}
  .bg .b-hero{top:0;height:780px;
    background:url('img/bg_hero.jpg') top center/2600px 780px no-repeat,

  .bg .b-main{top:780px;bottom:0;
    background:url('img/bg_a.jpg') top center/2600px 780px repeat-y,
               linear-gradient(90deg,#81c7e1 0 50%,#eb7f76 50% 100%);}

  .sp{position:relative;z-index:1;max-width:400px;margin:0 auto;background:#fff;

  .sp img{display:block;width:100%;height:auto;}
  #product{position:absolute;top:14.7677%;left:0;width:1px;height:1px;}
  .hit{position:absolute;display:block;z-index:5;
    /* background:rgba(255,0,0,.35); */ }

  /* ===== PC専用ヒーロー左右ヘッダー（Figma Frame 233準拠） ===== */
  .pc-header{display:none;}
  @media (min-width:1040px){
    .pc-header{display:block;position:absolute;top:0;left:0;width:100%;height:780px;z-index:2;pointer-events:none;
      font-family:'Hiragino Sans','Noto Sans JP',sans-serif;}
    .pc-header .side{position:absolute;top:0;height:780px;display:flex;align-items:center;justify-content:center;}
    .pc-header .left{left:0;width:calc((100% - 400px)/2);}
    .pc-header .right{right:0;width:calc((100% - 400px)/2);}
    .pc-header .wordmark{width:217px;height:42px;display:block;}
    .pc-header .cards{display:flex;gap:25px;align-items:flex-start;pointer-events:auto;}
    .pc-card{display:flex;flex-direction:column;align-items:center;width:150px;}
    .pc-card .bwrap{height:144px;display:flex;align-items:flex-end;justify-content:center;}
    .pc-card .bwrap img{height:144px;width:auto;display:block;}
    .pc-card .nm{margin-top:15px;font-family:'Montserrat',sans-serif;font-weight:600;font-size:17px;line-height:12px;color:#fff;letter-spacing:.85px;}
    .pc-card .pill{position:relative;margin-top:8px;width:150px;height:17px;display:flex;align-items:center;justify-content:center;}
    .pc-card .pill i{position:absolute;inset:0;opacity:.85;}
    .pc-card.sarari .pill i{background:#b2e4f3;} .pc-card.torori .pill i{background:#ffccc7;}
    .pc-card .pill span{position:relative;font-weight:400;font-size:10px;color:#363636;letter-spacing:1px;}
    .pc-card .price{margin-top:13px;font-family:'Montserrat',sans-serif;font-weight:600;color:#fff;letter-spacing:.75px;line-height:11px;}
    .pc-card .price .y{font-size:11px;} .pc-card .price .n{font-size:15px;}
    .pc-card .price .t{font-family:'Hiragino Sans','Noto Sans JP';font-weight:400;font-size:10px;letter-spacing:1px;}
    .pc-card .buy{margin-top:13px;width:150px;height:35px;border-radius:50px;display:flex;align-items:center;justify-content:center;gap:10px;
      color:#fff;font-weight:600;font-size:12px;text-decoration:none;box-shadow:0 4px 22px rgba(239,228,209,.6);}
    .pc-card.sarari .buy{background:linear-gradient(75.6deg,#00ace7 7.8%,#04a696 100%);}
    .pc-card.torori .buy{background:linear-gradient(76.3deg,#ff507c 1.2%,#ff6e6c 100%);}
    .pc-card .buy img{width:11px;height:11px;}
  }
