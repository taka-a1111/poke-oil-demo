<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PoKe Oil｜いつでも どこでも ヘアケア</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Noto+Sans+JP:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#eef2f4;font-family:'Hiragino Sans','Noto Sans JP',sans-serif;}
  /* responsive stage: everything sized relative to 1300x780 design */
  .hero{position:relative;width:100%;max-width:1300px;margin:0 auto;aspect-ratio:1300/780;
        container-type:inline-size;overflow:hidden;background:#fff;}
  .hero .layer{position:absolute;top:0;height:100%;object-fit:cover;}
  .hero img{display:block;}
  /* left+center hero art image covers x0-880 */
  .l-lc{left:0;width:67.692%;}          /* 880/1300 */
  .l-right{left:67.692%;width:32.308%;} /* 880-1300 */
  /* clickable hotspots over baked graphics (header buy / left logo) */
  .hs{position:absolute;display:block;z-index:6;text-indent:-9999px;overflow:hidden;border-radius:40px;}
  .hs-header{left:59.0%;top:6.09%;width:9.23%;height:4.49%;}
  .hs-logo{left:9.0%;top:47.3%;width:16.7%;height:5.4%;}

  /* ===== real-text product cards (overlaid on right column) ===== */
  .card{position:absolute;z-index:5;width:11.423%;/*148.5/1300*/ text-align:center;color:#fff;}
  .card1{left:70.308%;}   /* 914/1300 */
  .card2{left:83.654%;}   /* 1087.5/1300 */
  .card .bottle{position:absolute;top:0;left:30.3%;/*45/148.5*/ width:40.4%;/*60/148.5*/ }
  .card .bottle img{width:100%;height:auto;}
  .card .name{margin-top: /*set via top*/ 0;}
  .card-body{position:absolute;top:159px;left:0;width:100%;}
  /* We position using cqw for exact scaling */
  .card .pname{font-family:'Montserrat',sans-serif;font-weight:600;color:#fff;
               font-size:1.3077cqw;letter-spacing:0.065cqw;line-height:1.5;}
  .card .pill{position:relative;height:1.308cqw;/*17px*/ margin-top:0.615cqw;background:#b2e4f3;opacity:.85;}
  .card2 .pill{background:#ffccc7;}
  .card .pill span{position:absolute;left:0;right:0;top:50%;transform:translateY(-45%);
                   font-family:'Noto Sans JP';font-weight:400;color:#363636;
                   font-size:0.769cqw;letter-spacing:0.077cqw;opacity:1;}
  .card .price{margin-top:1.0cqw;font-family:'Montserrat';font-weight:600;color:#fff;letter-spacing:0.058cqw;}
  .card .price .yen{font-size:0.846cqw;}
  .card .price .num{font-size:1.1538cqw;}
  .card .price .tax{font-family:'Noto Sans JP';font-weight:400;font-size:0.769cqw;letter-spacing:0.077cqw;}
  .card .buy{margin-top:0.9cqw;height:2.692cqw;/*35px*/ border-radius:50px;
             display:flex;align-items:center;justify-content:center;gap:0.6cqw;
             font-family:'Noto Sans JP';font-weight:600;color:#fff;font-size:0.923cqw;
             box-shadow:0 0.3cqw 1.73cqw rgba(239,228,209,0.6);text-decoration:none;}
  .card1 .buy{background:linear-gradient(75.6deg,#00ace7 7.78%,#04a696 100%);}
  .card2 .buy{background:linear-gradient(76.28deg,#ff507c 1.15%,#ff6e6c 100%);}
  .card .buy svg{width:0.846cqw;height:0.846cqw;}

  /* card vertical layout via cqw offsets (relative to card top = Frame232 y=256) */
  .card{top:32.82%;/*256/780*/ height:34.36%;/*268/780*/}
  .card .stack{position:absolute;left:0;width:100%;top:11.077cqw;/*144px bottle -> labels start*/}
  .card .stack .pname{margin-top:1.154cqw;/*15px gap*/}
</style>
</head>
<body>
  <section class="hero">
    <!-- graphic layers from Figma (headline/badges/model/bottles/stamp are images in the source design) -->
    <img class="layer l-lc"    src="img/hero_leftcenter.jpg" alt="いつでも どこでも ヘアケア｜PoKe Oil">
    <img class="layer l-right" src="img/hero_right.jpg" alt="">

    <!-- clickable hotspots over baked graphics -->
    <a class="hs hs-header" href="#product">購入する</a>
    <a class="hs hs-logo" href="#top">PoKe Oil</a>

    <!-- REAL TEXT product cards -->
    <div class="card card1">
      <div class="bottle"><img src="img/bottle_sarari.jpg" alt="PoKe Oil さらり"></div>
      <div class="stack">
        <div class="pname">PoKe Oil</div>
        <div class="pill"><span>さらり</span></div>
        <div class="price"><span class="yen">￥</span><span class="num">3,850</span><span class="tax">（税込）</span></div>
        <a class="buy" href="#product">購入する
          <svg viewBox="0 0 12 12" fill="none"><path d="M2 6h7M6.5 3l3 3-3 3" stroke="#fff" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </a>
      </div>
    </div>

    <div class="card card2">
      <div class="bottle"><img src="img/bottle_torori.jpg" alt="PoKe Oil とろり"></div>
      <div class="stack">
        <div class="pname">PoKe Oil</div>
        <div class="pill"><span>とろり</span></div>
        <div class="price"><span class="yen">￥</span><span class="num">3,850</span><span class="tax">（税込）</span></div>
        <a class="buy" href="#product">購入する
          <svg viewBox="0 0 12 12" fill="none"><path d="M2 6h7M6.5 3l3 3-3 3" stroke="#fff" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </a>
      </div>
    </div>
  </section>
</body>
</html>
